# Render Blueprint — MicroSkillHub (single web service)
# Dashboard: New + → Blueprint → connect repo

services:
  - type: web
    name: microskillhub
    runtime: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: CORS_ORIGINS
        value: "*"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
